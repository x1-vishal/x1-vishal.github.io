<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ Programs | Vishal Coding Hub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: linear-gradient(135deg, #1d2671, #c33764);
    color: white;
}

/* Main content center */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
}

h1 {
    margin-bottom: 40px;
    font-size: 32px;
}

.program-container {
    display: flex;
    gap: 30px;
    flex-wrap: wrap;
    justify-content: center;
}

.card {
    background: white;
    color: black;
    padding: 20px 50px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

.card:hover {
    transform: translateY(-8px);
    background: #00c6ff;
    color: white;
}

.back {
    margin-top: 40px;
    padding: 10px 25px;
    border: 2px solid white;
    border-radius: 6px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.back:hover {
    background: white;
    color: black;
}

/* Footer always bottom */
footer {
    text-align: center;
    padding: 15px;
    background: rgba(0,0,0,0.3);
    font-size: 14px;
}

/* Mobile improvement */
@media(max-width:600px){
    h1{
        font-size: 24px;
    }
    .card{
        width: 80%;
    }
}
</style>
</head>

<body>

<div class="main">
    <h1>💻 My C++ Programs</h1>

    <div class="program-container">
        <a href="vowel.html" class="card">Vowel Checker</a>
        <a href="calculator.html" class="card">Calculator</a>
    </div>

    <a href="index.html" class="back">← Back to Home</a>
</div>

<footer>
    © 2026 Vishal Ahirwar
</footer>

</body>
</html>
