<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>9th & 11th Result</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
    animation: fadeIn 0.8s ease-in-out;
}

h2 {
    margin-bottom: 20px;
    color: #333;
    font-size: 20px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
    font-size: 15px;
    transition: 0.3s;
}

input:focus {
    border-color: #667eea;
    outline: none;
    box-shadow: 0 0 5px rgba(102,126,234,0.5);
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #667eea;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #5a67d8;
}

.footer {
    margin-top: 12px;
    font-size: 12px;
    color: gray;
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<div class="card">
    <h2>9th and 11th Result 2025-26</h2>

    <input type="text" id="roll" placeholder="Enter Roll Number">

    <button onclick="checkResult()">View Result</button>

    <div class="footer">Powered by EMS Portal</div>
</div>

<script>
function checkResult() {
    let roll = document.getElementById("roll").value.trim();

    if (roll === "") {
        alert("Please enter your roll number");
        return;
    }

    if (roll.length < 5) {
        alert("Invalid roll number");
        return;
    }

    let url = "https://ems.educationportal3.in/public/marksheet/" + roll;

    window.open(url, "_blank");
}
</script>

</body>
</html>
