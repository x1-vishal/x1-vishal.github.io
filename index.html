<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result Portal</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #1d2671, #c33764);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Effect Card */
.card {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    animation: fadeIn 1s ease-in-out;
    border: 1px solid rgba(255,255,255,0.2);
}

/* Logo */
.logo {
    width: 80px;
    margin-bottom: 10px;
}

/* Heading */
h2 {
    margin-bottom: 20px;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
}

/* Input */
input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 15px;
    font-size: 15px;
    outline: none;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #ffffff;
    color: #333;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    font-weight: bold;
}

button:hover {
    background: #ddd;
}

/* Footer */
.footer {
    margin-top: 12px;
    font-size: 12px;
    color: #eee;
}

/* Animation */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<div class="card">

    <!-- Logo -->
    <img src="logo.png" class="logo" alt="Board Logo">

    <!-- Heading -->
    <h2>9th & 11th Examination Result 2025-26</h2>

    <!-- Input -->
    <input type="number" id="roll" placeholder="Enter Roll Number">

    <!-- Button -->
    <button onclick="checkResult()">View Result</button>

    <!-- Footer -->
    <div class="footer">Powered by EMS Portal</div>

</div>

<script>
function checkResult() {
    let roll = document.getElementById("roll").value.trim();

    if (roll === "") {
        alert("Please enter your roll number");
        return;
    }

    if (roll.length < 11) {
        alert("Please Enter Valid Roll Number");
        return;
    }

    let url = "https://ems.educationportal3.in/public/marksheet/" + roll;

    window.open(url, "_blank");
}
</script>

</body>
</html>
